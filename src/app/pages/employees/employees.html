<h2>Employees</h2>
<h3>Search Employees</h3>

<input type="text" placeholder="Search by Designation"
       [(ngModel)]="searchDesignation">

<input type="text" placeholder="Search by Department"
       [(ngModel)]="searchDepartment">

<button (click)="searchEmployees()">Search</button>
<button (click)="getEmployees()">Reset</button>

<button routerLink="/add-employee">Add Employee</button>

<table border="1" *ngIf="employees.length > 0">
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Designation</th>
    <th>Department</th>
    <th>Actions</th>
  </tr>

  <tr *ngFor="let emp of employees">
    <td>{{ emp.first_name }} {{ emp.last_name }}</td>
    <td>{{ emp.email }}</td>
    <td>{{ emp.designation }}</td>
    <td>{{ emp.department }}</td>
    <td>
      <button [routerLink]="['/view-employee', emp._id]">View</button>
      <button [routerLink]="['/update-employee', emp._id]">Edit</button>
      <button (click)="deleteEmployee(emp._id)">Delete</button>
    </td>
  </tr>
</table>

<p *ngIf="employees.length === 0">No employees found.</p>
